<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Subtle grid lines matching the site's blueprint aesthetic -->
  <line x1="16" y1="0" x2="16" y2="64" stroke="#141414" stroke-width="0.5"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#141414" stroke-width="0.5"/>
  <line x1="48" y1="0" x2="48" y2="64" stroke="#141414" stroke-width="0.5"/>
  <line x1="0" y1="16" x2="64" y2="16" stroke="#141414" stroke-width="0.5"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#141414" stroke-width="0.5"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="#141414" stroke-width="0.5"/>
  <!-- Hand-drawn question mark curve in chalk color -->
  <path
    d="M 22 20 C 22 11, 32 7, 38 10 C 44 13, 44 19, 38 24 C 35 26.5, 33 28, 33 33 L 33 38"
